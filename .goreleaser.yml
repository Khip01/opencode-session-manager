version: 2

project_name: opencode-session-manager

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/opencode-sm
    binary: opencode-sm
    id: opencode-sm
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.CommitDate}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- .Arch }}
    files:
      - LICENSE
      - NOTICE
      - README.md

checksum:
  name_template: '{{ .ProjectName }}_{{ .Version }}_checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
  groups:
    - title: Features
      regexp: '^feat'
    - title: Bug fixes
      regexp: '^fix'
    - title: Others
      regexp: '^.*'

release:
  prerelease: auto
  draft: false
  name_template: "{{ .ProjectName }} {{ .Version }}"
  header: |
    ## opencode-session-manager {{ .Version }}

    See the [README](https://github.com/Khip01/opencode-session-manager/blob/main/README.md) for full documentation.

    ## Installation

    ### One-line install (recommended)

    Linux / macOS:

    ```sh
    curl -fsSL https://raw.githubusercontent.com/Khip01/opencode-session-manager/{{ .Version }}/scripts/install.sh | bash
    ```

    Windows (PowerShell):

    ```powershell
    irm https://raw.githubusercontent.com/Khip01/opencode-session-manager/{{ .Version }}/scripts/install.ps1 | iex
    ```

    ### Or via Go

    ```sh
    go install github.com/Khip01/opencode-session-manager/cmd/opencode-sm@{{ .Version }}
    ```

    ### Or download a binary

    Download the appropriate archive from the assets below, verify
    the SHA256 checksum against `*_checksums.txt`, and extract the
    `opencode-sm` binary into a directory on your `PATH`.

    ## Uninstallation

    If you installed via the binary or `go install`:

    ```sh
    opencode-sm uninstall              # remove binary from standard locations
    opencode-sm uninstall --purge      # also remove ~/.config/opencode-sm/
    opencode-sm uninstall --dry-run    # preview without removing
    ```

    If the binary is missing or broken, use the fallback script:

    Linux / macOS: `bash scripts/uninstall.sh`
    Windows (PowerShell): `powershell -File scripts/uninstall.ps1`

    Both fallback scripts delegate to `opencode-sm uninstall` when the
    binary is available on `PATH`.
  footer: |
    **Full Changelog**: https://github.com/Khip01/opencode-session-manager/compare/{{ .PreviousTag }}...{{ .Tag }}
